databases:
  - name: fantasy-cricket-db
    plan: free

services:
  - type: web
    name: fantasy-cricket
    runtime: python
    buildCommand: bash build.sh
    startCommand: python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fantasy-cricket-db
          property: connectionString
      - key: FIREBASE_CREDENTIALS
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.12.0
